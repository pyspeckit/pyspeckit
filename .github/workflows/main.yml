name: Run tests

on:
  push:
  pull_request:
  schedule:
    # run every Tuesday at 5am UTC
    - cron: '0 5 * * 2'

jobs:
  tests:
    name: ${{ matrix.name}}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
            name: Py3.10
            toxenv: py310-test
          - os: ubuntu-latest
            python-version: '3.11'
            name: Py3.11
            toxenv: py311-test
          - os: ubuntu-latest
            python-version: '3.12'
            name: Py3.12
            toxenv: py312-test
          - os: ubuntu-latest
            python-version: '3.13'
            name: Py3.13
            toxenv: py313-test
          - os: ubuntu-latest
            python-version: '3.12'
            name: Py3.12 dev astropy
            toxenv: py312-test-dev
          - os: ubuntu-latest
            python-version: '3.12'
            name: Documentation
            toxenv: build_docs

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install testing dependencies
      run: python -m pip install tox
    - name: Run tests with ${{ matrix.name }}
      run: tox -v -e ${{ matrix.toxenv }}
